<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>叽里呱啦 GEO 周度趋势</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:#f0f2f5;padding:32px 20px;color:#1a1a2e}
.back{display:inline-block;margin-bottom:24px;font-size:13px;color:#0f3460;text-decoration:none;padding:6px 14px;border:1px solid #0f3460;border-radius:20px}
.back:hover{background:#0f3460;color:#fff}
.page-header{text-align:center;margin-bottom:40px}
.page-header h1{font-size:24px;font-weight:800}
.page-header .meta{font-size:13px;color:#888;margin-top:6px}
.section{margin-bottom:32px}
.section-title{font-size:15px;font-weight:700;margin-bottom:14px;padding-left:10px;border-left:4px solid #0f3460}
.chart-box{background:#fff;border-radius:12px;padding:24px;box-shadow:0 2px 12px rgba(0,0,0,.07)}
.chart-box canvas{max-height:320px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:32px}
@media(max-width:680px){.grid2{grid-template-columns:1fr}}

/* 最新周 KPI 卡片 */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px;margin-bottom:32px}
.kpi{background:#fff;border-radius:12px;padding:16px;box-shadow:0 2px 12px rgba(0,0,0,.07);text-align:center}
.kpi .val{font-size:28px;font-weight:800}
.kpi .lbl{font-size:11px;color:#888;margin-top:4px}
.kpi .chg{font-size:12px;font-weight:600;margin-top:4px}
.up{color:#2e7d32}.dn{color:#e03131}.flat{color:#888}

/* 数据表 */
.data-table{width:100%;border-collapse:collapse;font-size:12px}
.data-table th{padding:9px 12px;background:#f8f9fa;font-weight:600;color:#555;border-bottom:2px solid #e0e0e0;text-align:center}
.data-table th:first-child{text-align:left}
.data-table td{padding:9px 12px;border-bottom:1px solid #f0f0f0;text-align:center}
.data-table td:first-child{text-align:left;font-weight:600}
.data-table tr.baseline td{background:#f0f4ff;font-style:italic;color:#666}
.data-table tr.latest td{background:#fff8e1;font-weight:700}

/* T1目标线说明 */
.legend-note{font-size:11px;color:#888;margin-top:8px;text-align:right}

footer{text-align:center;font-size:12px;color:#bbb;margin-top:40px;padding-top:16px;border-top:1px solid #e0e0e0}
</style>
</head>
<body>

<a class="back" href="../index.html">← 返回监控中心</a>

<div class="page-header">
  <h1>叽里呱啦 GEO 周度趋势</h1>
  <div class="meta" id="metaLine">加载中...</div>
</div>

<!-- 最新周 KPI -->
<div class="section">
  <div class="section-title">最新一周指标（对比上周）</div>
  <div class="kpi-row" id="kpiRow"></div>
</div>

<!-- 主趋势图 -->
<div class="section">
  <div class="section-title">核心指标趋势（周度）</div>
  <div class="chart-box">
    <canvas id="mainChart"></canvas>
    <div class="legend-note">虚线 = T1 目标值</div>
  </div>
</div>

<!-- 分组趋势 -->
<div class="grid2">
  <div class="chart-box">
    <canvas id="tagChart"></canvas>
  </div>
  <div class="chart-box">
    <canvas id="brandChart"></canvas>
  </div>
</div>

<!-- 数据明细表 -->
<div class="section">
  <div class="section-title">历史数据明细</div>
  <div style="background:#fff;border-radius:12px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,.07);overflow-x:auto">
    <table class="data-table" id="dataTable">
      <thead>
        <tr>
          <th>日期</th>
          <th>标签</th>
          <th>样本数</th>
          <th>任一Tag</th>
          <th>Tag1 听说先行</th>
          <th>Tag2 短时高频</th>
          <th>Tag3 兴趣驱动</th>
          <th>品牌提及</th>
          <th>品牌承接</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>

<footer>叽里呱啦 · GEO 周度追踪 · <a href="../index.html" style="color:#bbb">返回监控中心</a></footer>

<script>
// ── 数据（每周更新这里）──────────────────────────────────
const RAW = [
  { date:"2026-04-18", label:"T0基线", n:378, any:15.3, t1:3.4, t2:6.3, t3:7.1, brand:5.0, funnel:12.1 },
  { date:"2026-04-20", label:"W1",     n:378, any:16.4, t1:2.6, t2:7.1, t3:7.7, brand:4.8, funnel:8.1  },
];

// T1 目标
const T1 = { any:30, t1:15, t2:15, t3:15, brand:15, funnel:50 };

// ── 工具函数 ──────────────────────────────────────────────
const pct = v => v.toFixed(1) + '%';
const chgSymbol = (cur, prev) => cur > prev + 0.1 ? '↑' : cur < prev - 0.1 ? '↓' : '→';
const chgClass  = (cur, prev) => cur > prev + 0.1 ? 'up' : cur < prev - 0.1 ? 'dn' : 'flat';
const labels = RAW.map(r => r.label);

// ── meta 行 ──────────────────────────────────────────────
const latest = RAW[RAW.length - 1];
const prev   = RAW[RAW.length - 2] || latest;
document.getElementById('metaLine').textContent =
  `最新：${latest.date} · 共 ${RAW.length} 轮数据 · 样本 ${latest.n} 条`;

// ── KPI 卡片 ──────────────────────────────────────────────
const kpiDefs = [
  { key:'any',    label:'任一Tag命中',   t1:T1.any },
  { key:'t1',     label:'Tag1 听说先行', t1:T1.t1  },
  { key:'t2',     label:'Tag2 短时高频', t1:T1.t2  },
  { key:'t3',     label:'Tag3 兴趣驱动', t1:T1.t3  },
  { key:'brand',  label:'品牌提及率',    t1:T1.brand  },
  { key:'funnel', label:'品牌承接率',    t1:T1.funnel },
];
const kpiRow = document.getElementById('kpiRow');
kpiDefs.forEach(d => {
  const cur = latest[d.key], prv = prev[d.key];
  const sym = chgSymbol(cur, prv), cls = chgClass(cur, prv);
  const diff = (cur - prv).toFixed(1);
  kpiRow.innerHTML += `
    <div class="kpi">
      <div class="val">${pct(cur)}</div>
      <div class="lbl">${d.label}</div>
      <div class="chg ${cls}">${sym} ${diff > 0 ? '+' : ''}${diff}% vs 上轮</div>
      <div style="font-size:10px;color:#bbb;margin-top:2px">T1目标 ${d.t1}%</div>
    </div>`;
});

// ── 图表配置 ──────────────────────────────────────────────
const COLORS = {
  any:    '#0f3460',
  t1:     '#e03131',
  t2:     '#e67700',
  t3:     '#2e7d32',
  brand:  '#7b1fa2',
  funnel: '#0277bd',
};

function targetLine(key, len) {
  return { label: `T1目标 ${T1[key]}%`, data: Array(len).fill(T1[key]),
    borderColor: COLORS[key], borderDash: [6,4], borderWidth: 1.5,
    pointRadius: 0, fill: false };
}

const baseOpts = {
  responsive: true,
  maintainAspectRatio: true,
  scales: { y: { beginAtZero: true, ticks: { callback: v => v + '%' } } },
  plugins: { legend: { position: 'bottom' }, tooltip: { callbacks: {
    label: ctx => ctx.dataset.label + ': ' + ctx.parsed.y.toFixed(1) + '%'
  }}}
};

// 主图：任一Tag + 品牌 + 承接率
new Chart(document.getElementById('mainChart'), {
  type: 'line',
  data: {
    labels,
    datasets: [
      { label:'任一Tag命中', data: RAW.map(r=>r.any),    borderColor:COLORS.any,    backgroundColor:COLORS.any+'22',    tension:.3, fill:true, pointRadius:5, borderWidth:2 },
      { label:'品牌提及率',  data: RAW.map(r=>r.brand),  borderColor:COLORS.brand,  backgroundColor:COLORS.brand+'22',  tension:.3, fill:false, pointRadius:5, borderWidth:2 },
      { label:'品牌承接率',  data: RAW.map(r=>r.funnel), borderColor:COLORS.funnel, backgroundColor:COLORS.funnel+'22', tension:.3, fill:false, pointRadius:5, borderWidth:2 },
      targetLine('any', RAW.length),
      targetLine('brand', RAW.length),
      targetLine('funnel', RAW.length),
    ]
  },
  options: baseOpts
});

// Tag 分组图
new Chart(document.getElementById('tagChart'), {
  type: 'line',
  data: {
    labels,
    datasets: [
      { label:'Tag1 听说先行', data: RAW.map(r=>r.t1), borderColor:COLORS.t1, tension:.3, pointRadius:5, borderWidth:2, fill:false },
      { label:'Tag2 短时高频', data: RAW.map(r=>r.t2), borderColor:COLORS.t2, tension:.3, pointRadius:5, borderWidth:2, fill:false },
      { label:'Tag3 兴趣驱动', data: RAW.map(r=>r.t3), borderColor:COLORS.t3, tension:.3, pointRadius:5, borderWidth:2, fill:false },
      { ...targetLine('t1', RAW.length), label:'T1目标 15%' },
    ]
  },
  options: { ...baseOpts, plugins: { ...baseOpts.plugins,
    title: { display:true, text:'Tag 分组命中率趋势', font:{size:13,weight:'bold'} }
  }}
});

// 品牌图
new Chart(document.getElementById('brandChart'), {
  type: 'line',
  data: {
    labels,
    datasets: [
      { label:'品牌提及率',  data: RAW.map(r=>r.brand),  borderColor:COLORS.brand,  tension:.3, pointRadius:5, borderWidth:2, fill:false },
      { label:'品牌承接率',  data: RAW.map(r=>r.funnel), borderColor:COLORS.funnel, tension:.3, pointRadius:5, borderWidth:2, fill:false },
      targetLine('brand', RAW.length),
      targetLine('funnel', RAW.length),
    ]
  },
  options: { ...baseOpts, plugins: { ...baseOpts.plugins,
    title: { display:true, text:'品牌漏斗趋势', font:{size:13,weight:'bold'} }
  }}
});

// ── 历史数据表 ──────────────────────────────────────────────
const tbody = document.getElementById('tableBody');
[...RAW].reverse().forEach((r, i) => {
  const isBaseline = r.label === 'T0基线';
  const isLatest   = i === 0;
  tbody.innerHTML += `
    <tr class="${isBaseline?'baseline':''} ${isLatest?'latest':''}">
      <td>${r.date}</td>
      <td>${r.label}</td>
      <td>${r.n}</td>
      <td>${pct(r.any)}</td>
      <td>${pct(r.t1)}</td>
      <td>${pct(r.t2)}</td>
      <td>${pct(r.t3)}</td>
      <td>${pct(r.brand)}</td>
      <td>${pct(r.funnel)}</td>
    </tr>`;
});
</script>
</body>
</html>
