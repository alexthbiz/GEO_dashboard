<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>叽里呱啦 GEO 周度趋势</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:#F7F8FC;color:#1A1A2E}

/* 导航栏 */
.topnav{background:#fff;border-bottom:1px solid #E8ECF4;position:sticky;top:0;z-index:100}
.nav-inner{max-width:1200px;margin:0 auto;padding:0 40px;height:60px;display:flex;align-items:center;justify-content:space-between}
.nav-brand{font-size:18px;font-weight:800;color:#1A1A2E}
.nav-brand span{color:#29c07b}
.nav-links{display:flex;gap:32px}
.nav-links a{font-size:13px;color:#6B7280;text-decoration:none;font-weight:500;transition:.2s}
.nav-links a:hover{color:#29c07b}
.nav-links a.active{color:#29c07b;font-weight:700}

/* Hero */
.page-hero{background:linear-gradient(135deg,#f0faf4 0%,#fff 60%);border-bottom:1px solid #E8ECF4;padding:40px 0 36px}
.page-hero-inner{max-width:1200px;margin:0 auto;padding:0 40px}
.page-hero h1{font-size:28px;font-weight:800;color:#1A1A2E}
.page-hero .meta{font-size:13px;color:#6B7280;margin-top:8px}

/* 页面主体 */
.page-body{max-width:1200px;margin:0 auto;padding:32px 40px 60px}

/* Section 标题 */
.section-title{font-size:18px;font-weight:700;color:#1A1A2E;margin-bottom:16px;padding-left:14px;border-left:4px solid #29c07b}

/* KPI 横排 6 格 */
.kpi-row{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:32px}
.kpi{background:#fff;border-radius:16px;padding:20px 16px;box-shadow:0 2px 16px rgba(41,192,123,.08);border:1px solid #E8ECF4;text-align:center;transition:.2s}
.kpi:hover{transform:translateY(-2px);box-shadow:0 4px 20px rgba(41,192,123,.14)}
.kpi .val{font-size:28px;font-weight:800;color:#29c07b}
.kpi .lbl{font-size:11px;color:#6B7280;margin-top:6px;line-height:1.4}
.kpi .chg{font-size:12px;font-weight:600;margin-top:6px}
.kpi .t1-hint{font-size:10px;color:#B0B7C3;margin-top:4px}
.up{color:#29c07b}.dn{color:#ee4b4a}.flat{color:#6B7280}

/* 图表容器 */
.chart-box{background:#fff;border-radius:20px;padding:28px;box-shadow:0 2px 16px rgba(41,192,123,.08);border:1px solid #E8ECF4;margin-bottom:24px}
.chart-box canvas{max-height:340px}
.legend-note{font-size:11px;color:#6B7280;margin-top:10px;text-align:right}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
@media(max-width:680px){.grid2{grid-template-columns:1fr}}

/* 数据表 */
.table-wrap{background:#fff;border-radius:20px;padding:24px;box-shadow:0 2px 16px rgba(41,192,123,.08);border:1px solid #E8ECF4;overflow-x:auto}
.data-table{width:100%;border-collapse:collapse;font-size:12px}
.data-table th{padding:10px 14px;background:#F7F8FC;font-weight:700;color:#6B7280;border-bottom:2px solid #E8ECF4;text-align:center}
.data-table th:first-child{text-align:left}
.data-table td{padding:10px 14px;border-bottom:1px solid #F7F8FC;text-align:center}
.data-table td:first-child{text-align:left;font-weight:600;color:#1A1A2E}
.data-table tr.baseline td{background:#F7F8FC;color:#6B7280;font-style:italic}
.data-table tr.latest td{background:#FFFBE6;font-weight:700}

footer{text-align:center;font-size:12px;color:#6B7280;margin-top:40px;padding:24px;border-top:1px solid #E8ECF4;background:#fff}
.tip{position:relative;cursor:help;border-bottom:1px dashed #9CA3AF}
.tip::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:#1A1A2E;color:#fff;font-size:11px;line-height:1.6;padding:7px 11px;border-radius:8px;pointer-events:none;opacity:0;transition:opacity .15s;z-index:9999;width:200px;white-space:normal;text-align:left;box-shadow:0 4px 16px rgba(0,0,0,.18)}
.tip::before{content:'';position:absolute;bottom:calc(100% + 2px);left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:#1A1A2E;pointer-events:none;opacity:0;transition:opacity .15s;z-index:9999}
.tip:hover::after,.tip:hover::before{opacity:1}

@media(max-width:760px){
  /* 导航 */
  .nav-inner{padding:0 16px;height:52px}
  .nav-brand{font-size:15px;flex-shrink:0}
  .nav-links{gap:12px;overflow-x:auto;-webkit-overflow-scrolling:touch;flex-shrink:1;min-width:0;scrollbar-width:none}
  .nav-links::-webkit-scrollbar{display:none}
  .nav-links a{font-size:11px;white-space:nowrap}
  /* Hero */
  .page-hero{padding:24px 0 20px}
  .page-hero-inner{padding:0 16px}
  .page-hero h1{font-size:22px}
  /* 内容 */
  .page-body{padding:16px 16px 40px}
  .kpi-row{grid-template-columns:repeat(2,1fr)}
  .kpi .val{font-size:22px}
}
</style>
</head>
<body>

<nav class="topnav">
  <div class="nav-inner">
    <div class="nav-brand">叽里呱啦 <span>GEO</span></div>
    <div class="nav-links">
      <a href="../index.html">总览</a>
      <a href="index.html">实施看板</a>
      <a href="trends.html" class="active">趋势追踪</a>
      <a href="../baseline_T0/report/baseline_T0_report.html">基线报告</a>
      <a href="cases.html">案例明细</a>
    </div>
  </div>
</nav>

<div class="page-hero">
  <div class="page-hero-inner">
    <h1>叽里呱啦 GEO 周度趋势</h1>
    <div class="meta" id="metaLine">加载中...</div>
  </div>
</div>

<div class="page-body">

<!-- 最新周 KPI -->
<div class="section-title" style="margin-bottom:16px">最新一周指标（对比上周）</div>
<div class="kpi-row" id="kpiRow"></div>

<!-- 主趋势图 -->
<div class="section-title">核心指标趋势（周度）</div>
<div class="chart-box" style="margin-top:16px">
  <canvas id="mainChart"></canvas>
  <div class="legend-note">虚线 = T1 目标值</div>
</div>

<!-- 分组趋势 -->
<div class="grid2">
  <div class="chart-box" style="margin-bottom:0">
    <canvas id="tagChart"></canvas>
  </div>
  <div class="chart-box" style="margin-bottom:0">
    <canvas id="brandChart"></canvas>
  </div>
</div>

<!-- 数据明细表 -->
<div class="section-title" style="margin-top:32px;margin-bottom:16px">历史数据明细</div>
<div class="table-wrap">
  <table class="data-table" id="dataTable">
    <thead>
      <tr>
        <th>日期</th>
        <th>标签</th>
        <th>样本数</th>
        <th>任一Tag</th>
        <th>Tag1 听说先行</th>
        <th>Tag2 短时高频</th>
        <th>Tag3 兴趣驱动</th>
        <th>品牌提及</th>
        <th>品牌承接</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

</div><!-- page-body -->

<footer>叽里呱啦 · GEO 周度追踪 · <a href="../index.html" style="color:#29c07b">返回监控中心</a></footer>

<script>
// ── 数据（每周更新这里）──────────────────────────────────
const RAW = [
  { date:"2026-04-18", label:"T0基线", n:378, any:15.3, t1:3.4, t2:6.3, t3:7.1, brand:5.0, funnel:12.1 },
  { date:"2026-04-20", label:"W1",     n:378, any:16.4, t1:2.6, t2:7.1, t3:7.7, brand:4.8, funnel:8.1  },
];

// T1 目标
const T1 = { any:30, t1:15, t2:15, t3:15, brand:15, funnel:50 };

// ── 工具函数 ──────────────────────────────────────────────
const pct = v => v.toFixed(1) + '%';
const chgSymbol = (cur, prev) => cur > prev + 0.1 ? '↑' : cur < prev - 0.1 ? '↓' : '→';
const chgClass  = (cur, prev) => cur > prev + 0.1 ? 'up' : cur < prev - 0.1 ? 'dn' : 'flat';
const labels = RAW.map(r => r.label);

// ── meta 行 ──────────────────────────────────────────────
const latest = RAW[RAW.length - 1];
const prev   = RAW[RAW.length - 2] || latest;
document.getElementById('metaLine').textContent =
  `最新：${latest.date} · 共 ${RAW.length} 轮数据 · 样本 ${latest.n} 条`;

// ── KPI 卡片 ──────────────────────────────────────────────
const kpiDefs = [
  { key:'any',    label:'任一Tag命中',   t1:T1.any,    tip:'378条AI回答中，三组方法Tag至少命中一个的比例' },
  { key:'t1',     label:'Tag1 听说先行', t1:T1.t1,     tip:'包含"听说先行/拼读进阶"等Tag1关键词的比例，目前最弱，是首月内容重点' },
  { key:'t2',     label:'Tag2 短时高频', t1:T1.t2,     tip:'包含"短时高频/螺旋上升"等Tag2关键词的比例' },
  { key:'t3',     label:'Tag3 兴趣驱动', t1:T1.t3,     tip:'包含"兴趣驱动/学以致用"等Tag3关键词的比例' },
  { key:'brand',  label:'品牌提及率',    t1:T1.brand,  tip:'AI回答中直接提到"叽里呱啦"的比例' },
  { key:'funnel', label:'品牌承接率',    t1:T1.funnel, tip:'Tag命中的回答中，同时也提到叽里呱啦的比例。是最关键的漏斗转化指标，目标≥50%' },
];
const kpiRow = document.getElementById('kpiRow');
kpiDefs.forEach(d => {
  const cur = latest[d.key], prv = prev[d.key];
  const sym = chgSymbol(cur, prv), cls = chgClass(cur, prv);
  const diff = (cur - prv).toFixed(1);
  kpiRow.innerHTML += `
    <div class="kpi">
      <div class="val">${pct(cur)}</div>
      <div class="lbl"><span class="tip" data-tip="${d.tip}">${d.label}</span></div>
      <div class="chg ${cls}">${sym} ${diff > 0 ? '+' : ''}${diff}% vs 上轮</div>
      <div class="t1-hint">T1目标 ${d.t1}%</div>
    </div>`;
});

// ── 图表配置 ──────────────────────────────────────────────
const COLORS = {
  any:    '#29c07b',
  t1:     '#ee4b4a',
  t2:     '#f78e20',
  t3:     '#29c07b',
  brand:  '#6366f1',
  funnel: '#f78e20',
};

function targetLine(key, len) {
  return { label: `T1目标 ${T1[key]}%`, data: Array(len).fill(T1[key]),
    borderColor: COLORS[key], borderDash: [6,4], borderWidth: 1.5,
    pointRadius: 0, fill: false };
}

const baseOpts = {
  responsive: true,
  maintainAspectRatio: true,
  scales: {
    y: { beginAtZero: true, ticks: { callback: v => v + '%' }, grid: { color: '#F7F8FC' } },
    x: { grid: { color: '#F7F8FC' } }
  },
  plugins: { legend: { position: 'bottom' }, tooltip: { callbacks: {
    label: ctx => ctx.dataset.label + ': ' + ctx.parsed.y.toFixed(1) + '%'
  }}}
};

// 主图：任一Tag + 品牌 + 承接率
new Chart(document.getElementById('mainChart'), {
  type: 'line',
  data: {
    labels,
    datasets: [
      { label:'任一Tag命中', data: RAW.map(r=>r.any),    borderColor:COLORS.any,    backgroundColor:COLORS.any+'22',    tension:.3, fill:true, pointRadius:5, borderWidth:2 },
      { label:'品牌提及率',  data: RAW.map(r=>r.brand),  borderColor:COLORS.brand,  backgroundColor:COLORS.brand+'22',  tension:.3, fill:false, pointRadius:5, borderWidth:2 },
      { label:'品牌承接率',  data: RAW.map(r=>r.funnel), borderColor:COLORS.funnel, backgroundColor:COLORS.funnel+'22', tension:.3, fill:false, pointRadius:5, borderWidth:2 },
      targetLine('any', RAW.length),
      targetLine('brand', RAW.length),
      targetLine('funnel', RAW.length),
    ]
  },
  options: baseOpts
});

// Tag 分组图
new Chart(document.getElementById('tagChart'), {
  type: 'line',
  data: {
    labels,
    datasets: [
      { label:'Tag1 听说先行', data: RAW.map(r=>r.t1), borderColor:COLORS.t1, tension:.3, pointRadius:5, borderWidth:2, fill:false },
      { label:'Tag2 短时高频', data: RAW.map(r=>r.t2), borderColor:COLORS.t2, tension:.3, pointRadius:5, borderWidth:2, fill:false },
      { label:'Tag3 兴趣驱动', data: RAW.map(r=>r.t3), borderColor:COLORS.t3, tension:.3, pointRadius:5, borderWidth:2, fill:false },
      { ...targetLine('t1', RAW.length), label:'T1目标 15%' },
    ]
  },
  options: { ...baseOpts, plugins: { ...baseOpts.plugins,
    title: { display:true, text:'Tag 分组命中率趋势', font:{size:13,weight:'bold'} }
  }}
});

// 品牌图
new Chart(document.getElementById('brandChart'), {
  type: 'line',
  data: {
    labels,
    datasets: [
      { label:'品牌提及率',  data: RAW.map(r=>r.brand),  borderColor:COLORS.brand,  tension:.3, pointRadius:5, borderWidth:2, fill:false },
      { label:'品牌承接率',  data: RAW.map(r=>r.funnel), borderColor:COLORS.funnel, tension:.3, pointRadius:5, borderWidth:2, fill:false },
      targetLine('brand', RAW.length),
      targetLine('funnel', RAW.length),
    ]
  },
  options: { ...baseOpts, plugins: { ...baseOpts.plugins,
    title: { display:true, text:'品牌漏斗趋势', font:{size:13,weight:'bold'} }
  }}
});

// ── 历史数据表 ──────────────────────────────────────────────
const tbody = document.getElementById('tableBody');
[...RAW].reverse().forEach((r, i) => {
  const isBaseline = r.label === 'T0基线';
  const isLatest   = i === 0;
  tbody.innerHTML += `
    <tr class="${isBaseline?'baseline':''} ${isLatest?'latest':''}">
      <td>${r.date}</td>
      <td>${r.label}</td>
      <td>${r.n}</td>
      <td>${pct(r.any)}</td>
      <td>${pct(r.t1)}</td>
      <td>${pct(r.t2)}</td>
      <td>${pct(r.t3)}</td>
      <td>${pct(r.brand)}</td>
      <td>${pct(r.funnel)}</td>
    </tr>`;
});
</script>
</body>
</html>
