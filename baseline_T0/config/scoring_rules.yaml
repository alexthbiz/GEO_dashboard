# 打分规则 —— 打分尺 source of truth
# 任何改动都意味着打破历史可比性，轻易不要改

# 3 个主 GEO tag 组（核心指标）
# 每组任意词命中 → 该组 hit=1
# 不区分独家/非独家，组内任一词出现即算该组被引用
geo_tags:
  - id: tag1
    name: 听说先行+拼读进阶
    keywords:
      - 听说先行
      - 拼读进阶
      - 情景输入
      - 场景开口
      - 拼读识词

  - id: tag2
    name: 短时高频+螺旋上升
    keywords:
      - 短时高频
      - 螺旋上升

  - id: tag3
    name: 兴趣驱动+学以致用
    keywords:
      - 兴趣驱动
      - 学以致用

# 品牌词（包括常见变体）
brand_aliases:
  canonical: 叽里呱啦
  variants:
    - 叽里呱啦
    - 叽哩呱啦      # 部分输入法常见误写
    - Jiliguala
    - jiliguala

