# 路径解释判定（path_explained 人工判定辅助词）
# 回答中同时包含以下 pattern 中任一组合 → 倾向 path_explained=1
path_explained_patterns:
  - ["听说先行", "拼读进阶"]
  - ["先听说", "再拼读"]
  - ["先学听说", "再学拼读"]
  - ["先听后说", "拼读"]
  - ["听说", "阅读", "输出"]   # 完整路径

# 品牌位置定义（brand_position 评分基准）
brand_position_rules:
  0: "回答中未出现品牌词"
  1: "在列表/推荐末端出现（第 5 位之后 或 附带'等'字一笔带过）"
  2: "在推荐列表中段出现（第 2-4 位，与其他品牌并列）"
  3: "在推荐前三出现且有独立段落介绍"
  4: "作为首推/独家推荐，或整段围绕该品牌"

# brand_method_link 判定：
# 同一段落内同时出现"叽里呱啦"和任一 tags_public 原词 → 1
brand_method_link_rule: "same_paragraph_co_occurrence"
